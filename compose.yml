services:
  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DATABASE_PATH: /data/models_router.db
      FERNET_KEY: ${FERNET_KEY:?Set a new Fernet key in .env}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?Set a random bootstrap token in .env}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?Set the public host name in .env}
    expose:
      - "8000"
    volumes:
      - router_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?Set a public DNS name in .env}
      CADDY_EMAIL: ${CADDY_EMAIL:?Set the ACME contact email in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

volumes:
  router_data:
  caddy_data:
  caddy_config:
